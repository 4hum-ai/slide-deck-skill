name: Publish to Marketplaces

# Triggers on version tags: v1.2.0, v2.0.0, etc.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
#
# Required secrets (set in repo Settings → Secrets → Actions):
#   SMITHERY_TOKEN — from: smithery auth token --policy '{"resources":"servers","operations":["create","update"]}'
#
# One-time setup (human, npmjs.com):
#   npmjs.com/org/4humai → Settings → Trusted Publishing → Add:
#     Provider: GitHub Actions, Owner: 4hum-ai, Repo: slide-deck-skill, Workflow: publish.yml

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to update GitHub topics
  id-token: write   # required for npm OIDC Trusted Publishing + MCP Registry OIDC

jobs:
  publish:
    name: Publish ${{ github.ref_name }} to all marketplaces
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify version matches tag
        run: |
          PKG_VER="v$(node -p "require('./package.json').version")"
          TAG_VER="${GITHUB_REF_NAME}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "ERROR: package.json version ($PKG_VER) does not match tag ($TAG_VER)"
            exit 1
          fi
          echo "Version check passed: $PKG_VER"

      # ── 1. npm (Trusted Publishing / OIDC) ─────────────────────────────────
      - name: Publish to npm
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN needed — OIDC token from GitHub Actions is used automatically

      # ── 2. GitHub repo topics (enables Glama + aggregator auto-discovery) ──
      - name: Add GitHub topics for MCP discovery
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/4hum-ai/slide-deck-skill/topics \
            --method PUT \
            --field names[]="mcp-server" \
            --field names[]="mcp" \
            --field names[]="claude-skill" \
            --field names[]="skill" \
            --field names[]="slides" \
            --field names[]="presentation" \
          || echo "::warning::Could not update GitHub topics (non-fatal)"

      # ── 3. Official MCP Registry (registry.modelcontextprotocol.io) ────────
      - name: Install mcp-publisher
        run: npm install -g @modelcontextprotocol/publisher@latest || echo "::warning::mcp-publisher install failed (non-fatal)"

      - name: Publish to Official MCP Registry
        run: |
          if command -v mcp-publisher &> /dev/null; then
            mcp-publisher publish --config mcp-server.json || echo "::warning::MCP Registry publish failed (non-fatal — may need initial mcp-publisher init)"
          else
            echo "::warning::mcp-publisher not available, skipping"
          fi

      # ── 4. Smithery ─────────────────────────────────────────────────────────
      - name: Install Smithery CLI
        run: npm install -g @smithery/cli@latest || echo "::warning::Smithery CLI install failed (non-fatal)"

      - name: Publish to Smithery
        env:
          SMITHERY_TOKEN: ${{ secrets.SMITHERY_TOKEN }}
        run: |
          if [ -z "$SMITHERY_TOKEN" ]; then
            echo "::warning::SMITHERY_TOKEN secret not set — skipping Smithery publish"
            exit 0
          fi
          if command -v smithery &> /dev/null; then
            smithery mcp publish https://registry.npmjs.org/@4humai/slide-deck-skill \
              -n "4humai/slide-deck-skill" \
              --auth-token "$SMITHERY_TOKEN" \
              || echo "::warning::Smithery publish failed (non-fatal)"
          else
            echo "::warning::smithery CLI not available, skipping"
          fi

      # ── 5. ClawHub ──────────────────────────────────────────────────────────
      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::warning::CLAWHUB_TOKEN secret not set — skipping ClawHub publish"
            exit 0
          fi
          # Install clawhub CLI and publish
          npm install -g clawhub@latest 2>/dev/null || true
          if command -v clawhub &> /dev/null; then
            CLAWHUB_AUTH_TOKEN="$CLAWHUB_TOKEN" clawhub skill publish . \
              --slug slide-deck-skill \
              --version "${{ github.ref_name }}" \
              || echo "::warning::ClawHub publish failed (non-fatal)"
          else
            echo "::warning::clawhub CLI not available, skipping"
          fi

      # ── 6. Summary ──────────────────────────────────────────────────────────
      - name: Publish summary
        run: |
          echo "## Published ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Marketplace | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| npm (@4humai/slide-deck-skill) | ✅ Published |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Topics (mcp-server, skill) | ✅ Updated |" >> $GITHUB_STEP_SUMMARY
          echo "| Official MCP Registry | ⚠️ Check logs |" >> $GITHUB_STEP_SUMMARY
          echo "| Smithery | ⚠️ Check logs (needs SMITHERY_TOKEN secret) |" >> $GITHUB_STEP_SUMMARY
          echo "| Glama | 🔄 Auto-discovered via GitHub topic |" >> $GITHUB_STEP_SUMMARY
          echo "| Skills.sh | 🔄 Auto-discovered via SKILL.md |" >> $GITHUB_STEP_SUMMARY
          echo "| ClawHub | ⚠️ Check logs (needs CLAWHUB_TOKEN secret) |" >> $GITHUB_STEP_SUMMARY
