name: Publish to npm

# Triggers on version tags: v1.2.0, v2.0.0, etc.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# One-time setup on npmjs.com:
#   1. Go to npmjs.com → package "slide-deck-mcp" → Settings → Publishing
#   2. Add Trusted Publisher → GitHub Actions
#      - Owner:    4hum-ai
#      - Repo:     slide-deck-skill
#      - Workflow: publish.yml
#      - Environment: (leave blank)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for OIDC Trusted Publishing

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify version matches tag
        run: |
          PKG_VER="v$(node -p "require('./package.json').version")"
          TAG_VER="${GITHUB_REF_NAME}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "ERROR: package.json version ($PKG_VER) does not match tag ($TAG_VER)"
            exit 1
          fi
          echo "Version check passed: $PKG_VER"

      - name: Publish to npm (Trusted Publishing)
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN needed — OIDC token from GitHub Actions is used automatically
